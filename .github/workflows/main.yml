name: Build, Test & Deploy

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: ghcr.io/fredagscafeen/web

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.4"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt

      - name: Setup pip version
        run: pip install pip==26.0.1

      - name: Install python dependencies
        run: pip install -r requirements.txt -r dev-requirements.txt

      - name: Run pre-commit checks
        uses: ./.github/actions/pre-commit

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKER_IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=Fredagscafeen Web
            org.opencontainers.image.description=Web application for Fredagscafeen
            org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}
            org.opencontainers.image.url=https://fredagscafeen.dk
            org.opencontainers.image.vendor=Fredagscafeen
          tags: |
            type=raw,value={{sha}}

      - name: Short SHA
        id: short_sha
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=${{ runner.temp }}/web-docker-image.tar
          build-args: |
            GIT_COMMIT_HASH=${{ steps.short_sha.outputs.SHORT_SHA }}
            GIT_BRANCH=${{ github.ref_name }}

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: |
          docker run --env DJANGO_SETTINGS_MODULE=fredagscafeen.settings.local \
          "${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}" \
          ./manage.py test

  test-docker-compose:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            docker-compose.yml

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test docker compose
        run: |
          for k in "SECRET_KEY" "RECAPTCHA_PUBLIC_KEY" "RECAPTCHA_PRIVATE_KEY"; do
            echo "$k=foo" >> ".env"
          done
          docker network create traefik
          docker compose up -d
          sleep 10
          res=$(docker compose ps)
          echo "$res"
          if echo "$res" | grep Exit &>/dev/null; then
            exit 1
          fi

  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs:
      - pre-commit
      - build
      - test
      - test-docker-compose
    permissions:
      packages: write
    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image and tag as latest
        run: |
          docker pull "${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          docker tag "${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}" "${{ env.DOCKER_IMAGE_NAME }}:latest"

      - name: Push Docker image
        run: |
          docker push "${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          docker push "${{ env.DOCKER_IMAGE_NAME }}:latest"

  deploy:
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 2
    steps:
      - name: Deploy image to production
        run: curl --fail -X POST "$WEBHOOK_URL"
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  summary:
    runs-on: ubuntu-latest
    needs: [pre-commit, build, test, test-docker-compose, release, deploy]
    if: always() # Ensures the summary is posted even if tests fail
    steps:
      - name: Generate Summary
        run: |
          IS_MASTER="${{ github.ref == 'refs/heads/master' }}"

          # Header Section
          echo "<h1>Workflow Summary: ${{ github.ref_name }}</h1>" >> $GITHUB_STEP_SUMMARY

          echo "<h3>Pipeline Overview</h3>" >> $GITHUB_STEP_SUMMARY
          echo "<table>
            <tr><td><b>Linting</b></td><td>${{ needs.pre-commit.result == 'success' && '✅' || '❌' }}</td></tr>
            <tr><td><b>Image Build</b></td><td>${{ needs.build.result == 'success' && '✅' || '❌' }}</td></tr>
            <tr><td><b>Django Tests</b></td><td>${{ needs.test.result == 'success' && '✅' || '❌' }}</td></tr>
            <tr><td><b>Docker Compose Tests</b></td><td>${{ needs.test-docker-compose.result == 'success' && '✅' || '❌' }}</td></tr>
          </table>" >> $GITHUB_STEP_SUMMARY

          if [ "$IS_MASTER" = "true" ]; then
            echo "<h2>✅ Production Release Ready</h2>" >> $GITHUB_STEP_SUMMARY
            echo "<p>The <b>master</b> branch has been built and pushed to the registry.</p>" >> $GITHUB_STEP_SUMMARY

            echo "<h3>Deployment Status</h3>" >> $GITHUB_STEP_SUMMARY
            if [ "${{ needs.deploy.result }}" = "success" ]; then
              echo "<p><b>Deployment Triggered Successfully</b></p>" >> $GITHUB_STEP_SUMMARY
            else
              echo "<p><b>Deployment Trigger Failed</b></p>" >> $GITHUB_STEP_SUMMARY
            fi

            echo "<h3>Manual Deployment</h3>" >> $GITHUB_STEP_SUMMARY
            echo "<div style='background-color: #2b2b2b; color: #f1f1f1; padding: 15px; border-radius: 5px; font-family: monospace;'>" >> $GITHUB_STEP_SUMMARY
            echo "ssh ubuntu@fredagscafeen.dk<br>cd ~/web<br>git pull<br>docker compose pull<br>docker compose up -d" >> $GITHUB_STEP_SUMMARY
            echo "</div>" >> $GITHUB_STEP_SUMMARY

            echo "<h3>Images</h3>" >> $GITHUB_STEP_SUMMARY
            echo "<ul><li><code>${{ env.DOCKER_IMAGE_NAME }}:latest</code></li><li><code>${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}</code></li></ul>" >> $GITHUB_STEP_SUMMARY
          else
            echo "<h2>Development Build</h2>" >> $GITHUB_STEP_SUMMARY
            echo "<p>Status: <b>${{ needs.test.result == 'success' && 'Tests Passed' || 'Tests Failed' }}</b></p>" >> $GITHUB_STEP_SUMMARY
            echo "<blockquote>This is a feature branch build. Production deployment is disabled.</blockquote>" >> $GITHUB_STEP_SUMMARY
          fi
