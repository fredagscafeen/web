  #           docker-compose.yml

  #     - name: Download docker image
  #       uses: actions/download-artifact@v7
  #       with:
  #         name: web-docker-image
  #         path: ${{ runner.temp }}/web-docker-image.tar

  #     - name: Load docker image
  #       run: docker load --input ${{ runner.temp }}/web-docker-image.tar

  #     - name: Test docker compose
  #       run: |
  #         for k in "SECRET_KEY" "RECAPTCHA_PUBLIC_KEY" "RECAPTCHA_PRIVATE_KEY"; do
  #           echo "$k=foo" >> ".env"
  #         done
  #         docker network create traefik
  #         docker compose up -d
  #         sleep 10
  #         res=$(docker compose ps)
  #         echo "$res"
  #         if echo "$res" | grep Exit &>/dev/null; then
  #           exit 1
  #         fi

  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs:
      - pre-commit
      - build
      - test
    steps:
      - name: Download docker image
        uses: actions/download-artifact@v7
        with:
          name: web-docker-image
          path: ${{ runner.temp }}/web-docker-image.tar

      - name: Load docker image
        run: docker load --input ${{ runner.temp }}/web-docker-image.tar

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image with latest
        run: docker tag "${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}" "${{ env.DOCKER_IMAGE_NAME }}:latest"

      - name: Push Docker image
        run: |
          docker push "${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          docker push "${{ env.DOCKER_IMAGE_NAME }}:latest"

