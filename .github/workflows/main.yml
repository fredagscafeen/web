name: Build, Test & Deploy

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: ghcr.io/fredagscafeen/web

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt

      - name: Setup pip version
        run: pip install pip==24.0.0

      - name: Install python dependencies
        run: pip install -r requirements.txt -r dev-requirements.txt

      - name: Run pre-commit checks
        uses: ./.github/actions/pre-commit

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKER_IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=Fredagscafeen Web
            org.opencontainers.image.description=Web application for Fredagscafeen
            org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}
            org.opencontainers.image.url=https://fredagscafeen.dk
            org.opencontainers.image.vendor=Fredagscafeen
          tags: |
            type=raw,value={{sha}}

      - name: Short SHA
        id: short_sha
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=${{ runner.temp }}/web-docker-image.tar
          build-args: |
            GIT_COMMIT_HASH=${{ steps.short_sha.outputs.SHORT_SHA }}
            GIT_BRANCH=${{ github.ref_name }}

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: |
          docker run --env DJANGO_SETTINGS_MODULE=fredagscafeen.settings.local \
          "${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}" \
          ./manage.py test

  # test-docker-compose:
  #   runs-on: ubuntu-latest
  #   needs: build
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v6
  #       with:
  #         sparse-checkout: |
  #           docker-compose.yml

  #     - name: Download docker image
  #       uses: actions/download-artifact@v7
  #       with:
  #         name: web-docker-image
  #         path: ${{ runner.temp }}/web-docker-image.tar

  #     - name: Load docker image
  #       run: docker load --input ${{ runner.temp }}/web-docker-image.tar

  #     - name: Test docker compose
  #       run: |
  #         for k in "SECRET_KEY" "RECAPTCHA_PUBLIC_KEY" "RECAPTCHA_PRIVATE_KEY"; do
  #           echo "$k=foo" >> ".env"
  #         done
  #         docker network create traefik
  #         docker compose up -d
  #         sleep 10
  #         res=$(docker compose ps)
  #         echo "$res"
  #         if echo "$res" | grep Exit &>/dev/null; then
  #           exit 1
  #         fi

  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs:
      - pre-commit
      - build
      - test
    permissions:
      packages: read
    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image and tag as latest
        run: |
          docker pull "${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          docker tag "${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}" "${{ env.DOCKER_IMAGE_NAME }}:latest"

      - name: Push Docker image
        run: |
          docker push "${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          docker push "${{ env.DOCKER_IMAGE_NAME }}:latest"

  # deploy: THIS IS BROKEN AND SHOULD NOT BE USED UNTIL FIXED - WEBHOOK POINTS TO webhooks.tyilo.com/hook
  #   runs-on: ubuntu-latest
  #   needs: release
  #   steps:
  #     - name: Deploy image to production
  #       run: curl --fail -X POST "$WEBHOOK_URL"
  #       env:
  #         WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  summary:
    runs-on: ubuntu-latest
    needs: [pre-commit, build, test, release]
    if: always() # Ensures the summary is posted even if tests fail
    steps:
      - name: Generate Summary
        run: |
          # Determine Context
          IS_MASTER="${{ github.ref == 'refs/heads/master' }}"
          STATUS_EMOJI="${{ (needs.pre-commit.result == 'success' && needs.test.result == 'success') && '✅' || '❌' }}"

          echo "## $STATUS_EMOJI Workflow Report: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY

          if [ "$IS_MASTER" = "true" ]; then
            # --- MASTER / RELEASE SUMMARY ---
            echo "### 🚀 Production Release: \`master\`" >> $GITHUB_STEP_SUMMARY
            echo "<p align='center'><strong>The production image is ready for deployment.</strong></p>" >> $GITHUB_STEP_SUMMARY

            echo "<h4>📦 Artifacts</h4>" >> $GITHUB_STEP_SUMMARY
            echo "| Registry | Image | Tag |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo "| GHCR | \`${{ env.DOCKER_IMAGE_NAME }}\` | \`latest\` |" >> $GITHUB_STEP_SUMMARY
            echo "| GHCR | \`${{ env.DOCKER_IMAGE_NAME }}\` | \`${{ needs.build.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY

            echo "<h4>🛠️ Deployment Instructions</h4>" >> $GITHUB_STEP_SUMMARY
            echo "Run these commands on the production server:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash
            ssh ubuntu@fredagscafeen.dk
            cd ~/web
            git pull
            docker compose pull
            docker compose up -d
            \`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            # --- DEVELOPMENT / PR SUMMARY ---
            echo "### 🛠️ Development Build: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "This build was generated from a feature branch or Pull Request." >> $GITHUB_STEP_SUMMARY

            echo "<h4>🧪 Test Results</h4>" >> $GITHUB_STEP_SUMMARY
            echo "* **Pre-commit:** ${{ needs.pre-commit.result }}" >> $GITHUB_STEP_SUMMARY
            echo "* **Build:** ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
            echo "* **Django Tests:** ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY

            echo "<blockquote>⚠️ <b>Note:</b> This image was <b>not</b> tagged as <code>latest</code>. Deployment to production is disabled for this branch.</blockquote>" >> $GITHUB_STEP_SUMMARY
          fi

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "#### ✨ Build Metadata" >> $GITHUB_STEP_SUMMARY
          echo "* **Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "* **Commit:** [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
