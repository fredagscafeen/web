name: Build, Test & Deploy

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: ghcr.io/fredagscafeen/web

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt

      - name: Setup pip version
        run: pip install pip==24.0.0

      - name: Install python dependencies
        run: pip install -r requirements.txt -r dev-requirements.txt

      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.1

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKER_IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=Fredagscafeen Web
            org.opencontainers.image.description=Web application for Fredagscafeen
            org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}
            org.opencontainers.image.url=https://fredagscafeen.dk
            org.opencontainers.image.vendor=Fredagscafeen
          tags: |
            type=raw,value={{sha}}

      - name: Short SHA
        id: short_sha
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=${{ runner.temp }}/web-docker-image.tar
          build-args: |
            GIT_COMMIT_HASH=${{ steps.short_sha.outputs.SHORT_SHA }}
            GIT_BRANCH=${{ github.ref_name }}

      - name: Upload image for other jobs
        uses: actions/upload-artifact@v7
        with:
          name: web-docker-image
          path: ${{ runner.temp }}/web-docker-image.tar

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download docker image
        uses: actions/download-artifact@v7
        with:
          name: web-docker-image
          path: ${{ runner.temp }}/web-docker-image.tar

      - name: Load docker image
        run: docker load --input ${{ runner.temp }}/web-docker-image.tar

      - name: Run tests
        run: |
          docker run --env DJANGO_SETTINGS_MODULE=fredagscafeen.settings.local \
          "${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}" \
          ./manage.py test

  # test-docker-compose:
