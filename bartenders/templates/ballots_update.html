{% extends 'base.html' %}
{% load i18n %}
{% load static %}
{% load django_bootstrap5 bootstrap_icons %}

{% block content %}

<p><a href="{% url 'admin:bartenders_poll_changelist' %}">Poll admin</a></p>

<p>Stemmeberettigede: <b>{{ votees.count }}</b></p>

<h2>Tilføj poll</h2>

<form method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    <div class="mt-3">
        {% translate "Gem" as BUTTON_TEXT %}
        <button type="submit" class="btn btn-primary" style="margin-top: 15px; margin-bottom: 15px;">
            {% bs_icon 'floppy2' size='1.0em' %} {{ BUTTON_TEXT }}
        </button>
    </div>
</form>

{% endblock %}
